<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARC Trace Viewer</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div id="app">
  <header>
    <h1>ARC Trace Viewer</h1>
    <div class="filters">
      <label><input type="checkbox" id="f-thinking"> Hide thinking</label>
      <label><input type="checkbox" id="f-sysprompt"> Hide sysprompt</label>
      <label><input type="checkbox" id="f-compact"> Compact</label>
      <label>Turn <input type="number" id="f-turn" min="-1" value="-1" title="-1 = all"></label>
      <span class="kbd-hint">j/k nav &middot; e/c expand/collapse &middot; t thinking &middot; s sysprompt</span>
    </div>
  </header>
  <div id="sidebar"></div>
  <div id="trace" class="empty">Select a session from the sidebar</div>
</div>
<script type="module" src="./main.js"></script>
</body>
</html>
